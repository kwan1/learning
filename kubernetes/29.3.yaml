apiVersion: v1
kind: Pod
metadata:
  name: data-pod
  namespace: storage
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 80
    volumeMounts:
      - name: pod-volume
        mountPath: /usr/share/nginx/html
  volumes:
    - name: pod-volume
      persistentVolumeClaim:
        claimName: data-pvc
      

